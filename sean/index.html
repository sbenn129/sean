  <style>
    [data-theme="dark"] {
      --bg:           #0f0f0f;
      --bg-card:      #1a1a1a;
      --border:       #2a2a2a;
      --text-primary: #f0f0f0;
      --text-muted:   #888888;
      --accent:       #2dd4bf;
      --accent-glow:  rgba(45, 212, 191, 0.15);
      --btn-bg:       #1e1e1e;
      --btn-hover:    #2c2c2c;
      --toggle-bg:    #2a2a2a;
    }

    [data-theme="light"] {
      --bg:           #f5f5f5;
      --bg-card:      #ffffff;
      --border:       #e0e0e0;
      --text-primary: #111111;
      --text-muted:   #666666;
      --accent:       #0d9488;
      --accent-glow:  rgba(13, 148, 136, 0.10);
      --btn-bg:       #efefef;
      --btn-hover:    #e0e0e0;
      --toggle-bg:    #e0e0e0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 0;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* ---- Dark/Light Mode Toggle ---- */
    .toggle-wrap {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 100;
    }

    .toggle-btn {
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-btn:hover {
      border-color: var(--accent);
    }

    .toggle-icon { font-size: 15px; }

    /* ---- Profile Card ---- */
    .card {
      position: relative;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 32px 24px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.08);
      transition: background 0.3s, border-color 0.3s;
    }

      background-size: cover;
      background-position: center;
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .avatar-placeholder {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--text-muted);
      user-select: none;
    }

    /* ---- Name & Tagline ---- */
    .profile-name {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -0.3px;
      text-align: center;
      color: var(--text-primary);
    }

    .profile-tagline {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    /* ---- Divider ---- */
    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      border-radius: 999px;
      opacity: 0.5;
      margin: 4px 0;
    }

    /* ---- Link Buttons ---- */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 18px;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      cursor: pointer;
    }

    .link-btn:hover {
      background: var(--btn-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .link-btn:active {
      transform: translateY(0px);
    }

    .btn-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .btn-label { color: var(--text-primary); }

    .btn-arrow {
      color: var(--text-muted);
      font-size: 18px;
      transition: transform 0.2s, color 0.2s;
    }

    .link-btn:hover .btn-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    /* ---- Email Widget ---- */
    .email-widget {
      width: 100%;
    }

    /* The trigger button uses .link-btn styles above but needs slight tweaks */
    .email-trigger-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 18px;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s, border-bottom-left-radius 0.25s, border-bottom-right-radius 0.25s;
    }

    .email-trigger-btn:hover {
      background: var(--btn-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .email-trigger-btn.open {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-color: var(--accent);
      background: var(--btn-hover);
      transform: none;
      box-shadow: none;
    }

    .email-trigger-btn .btn-arrow {
      transition: transform 0.3s ease, color 0.2s;
    }

    .email-trigger-btn.open .btn-arrow {
      transform: rotate(90deg);
      color: var(--accent);
    }

    /* ---- Expanding Form Panel ---- */
    .email-form-panel {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: scaleY(0.97);
      transform-origin: top center;
      transition:
        max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.3s ease,
        transform 0.3s ease;
      border: 1px solid var(--accent);
      border-top: none;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      background: var(--btn-bg);
    }

    .email-form-panel.open {
      max-height: 500px;
      opacity: 1;
      transform: scaleY(1);
    }

    .form-inner {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-field label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .form-field input,
    .form-field textarea {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .form-field input::placeholder,
    .form-field textarea::placeholder {
      color: var(--text-muted);
    }

    .form-field input:focus,
    .form-field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-field textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-submit-btn {
      width: 100%;
      padding: 11px 18px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 2px;
    }

    .form-submit-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .form-submit-btn:active {
      transform: translateY(0);
    }

    .form-submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .form-status {
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      color: var(--accent);
    }

    .form-status.error {
      color: #f87171;
    }

    /* ---- Footer ---- */
    footer {
      margin-top: auto;
      padding: 24px 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      width: 100%;
      max-width: 480px;
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--accent); }

  </style>

</head>

  <script>
    /* ---- Theme Toggle ---- */
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
    }

    /* ---- Email Form Toggle ---- */
    function toggleEmailForm() {
      const trigger = document.getElementById('emailTrigger');
      const panel   = document.getElementById('emailFormPanel');
      const isOpen  = panel.classList.contains('open');

      if (isOpen) {
        panel.classList.remove('open');
        trigger.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
      } else {
        panel.classList.add('open');
        trigger.classList.add('open');
        trigger.setAttribute('aria-expanded', 'true');
        // Focus first field after animation
        setTimeout(() => document.getElementById('contactName').focus(), 320);
      }
    }

    /* ---- Formspree Submission ---- */
    async function submitForm() {
      const name    = document.getElementById('contactName').value.trim();
      const email   = document.getElementById('contactEmail').value.trim();
      const message = document.getElementById('contactMessage').value.trim();
      const status  = document.getElementById('formStatus');
      const btn     = document.getElementById('submitBtn');

      // Basic validation
      if (!name || !email || !message) {
        status.textContent = 'Please fill in all fields.';
        status.className = 'form-status error';
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        status.textContent = 'Please enter a valid email address.';
        status.className = 'form-status error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';
      status.textContent = '';
      status.className = 'form-status';

      try {
        const res = await fetch('https://formspree.io/f/xaqaaegn', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ name, email, message })
        });

        if (res.ok) {
          status.textContent = '✓ Message sent!';
          status.className = 'form-status';
          document.getElementById('contactName').value    = '';
          document.getElementById('contactEmail').value   = '';
          document.getElementById('contactMessage').value = '';
          btn.textContent = 'Send Message';
          btn.disabled = false;
          // Close after 2.5s
          setTimeout(() => toggleEmailForm(), 2500);
        } else {
          throw new Error('Server error');
        }
      } catch (err) {
        status.textContent = 'Something went wrong. Please try again.';
        status.className = 'form-status error';
        btn.textContent = 'Send Message';
        btn.disabled = false;
      }
    }
  </script>
