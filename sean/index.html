<!DOCTYPE html>

<html lang="en" data-theme="dark"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sean Bennett | SEAN.BENNETT.WS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
/* ============================================================
   THEME PRESETS — ACCENT & GLOW
   To switch themes, copy ONE dark pair into [data-theme="dark"]
   and ONE light pair into [data-theme="light"].
   Only change --accent and --accent-glow in each block.
   ============================================================

   TEAL 
   dark:  --accent: #2dd4bf;  --accent-glow: rgba(45, 212, 191, 0.15);
   light: --accent: #0d9488;  --accent-glow: rgba(13, 148, 136, 0.10);

   GOLD
   dark:  --accent: #f59e0b;  --accent-glow: rgba(245, 158, 11, 0.15);
   light: --accent: #b45309;  --accent-glow: rgba(180, 83, 9, 0.10);

   PURPLE
   dark:  --accent: #a78bfa;  --accent-glow: rgba(167, 139, 250, 0.15);
   light: --accent: #7c3aed;  --accent-glow: rgba(124, 58, 237, 0.10);

   ROSE
   dark:  --accent: #fb7185;  --accent-glow: rgba(251, 113, 133, 0.15);
   light: --accent: #e11d48;  --accent-glow: rgba(225, 29, 72, 0.10);

   ICE BLUE
   dark:  --accent: #38bdf8;  --accent-glow: rgba(56, 189, 248, 0.15);
   light: --accent: #0284c7;  --accent-glow: rgba(2, 132, 199, 0.10);

   SAGE GREEN
   dark:  --accent: #86efac;  --accent-glow: rgba(134, 239, 172, 0.15);
   light: --accent: #16a34a;  --accent-glow: rgba(22, 163, 74, 0.10);

   ORANGE
   dark:  --accent: #fb923c;  --accent-glow: rgba(251, 146, 60, 0.15);
   light: --accent: #ea580c;  --accent-glow: rgba(234, 88, 12, 0.10);

   CORAL
   dark:  --accent: #ff6b6b;  --accent-glow: rgba(255, 107, 107, 0.15);
   light: --accent: #dc2626;  --accent-glow: rgba(220, 38, 38, 0.10);

   ELECTRIC LIME
   dark:  --accent: #a3e635;  --accent-glow: rgba(163, 230, 53, 0.15);
   light: --accent: #65a30d;  --accent-glow: rgba(101, 163, 13, 0.10);

   SLATE BLUE
   dark:  --accent: #818cf8;  --accent-glow: rgba(129, 140, 248, 0.15);
   light: --accent: #4338ca;  --accent-glow: rgba(67, 56, 202, 0.10);

   HOT PINK
   dark:  --accent: #f472b6;  --accent-glow: rgba(244, 114, 182, 0.15);
   light: --accent: #be185d;  --accent-glow: rgba(190, 24, 93, 0.10);

   CYAN
   dark:  --accent: #22d3ee;  --accent-glow: rgba(34, 211, 238, 0.15);
   light: --accent: #0891b2;  --accent-glow: rgba(8, 145, 178, 0.10);

   ============================================================ */
    
    [data-theme="dark"] {
      --bg:           #0f0f0f;
      --bg-card:      #1a1a1a;
      --border:       #2a2a2a;
      --text-primary: #f0f0f0;
      --text-muted:   #888888;
      --accent:       #2dd4bf;
      --accent-glow:  rgba(45, 212, 191, 0.15);
      --btn-bg:       #1e1e1e;
      --btn-hover:    #2c2c2c;
      --toggle-bg:    #2a2a2a;
    }

    [data-theme="light"] {
      --bg:           #f5f5f5;
      --bg-card:      #ffffff;
      --border:       #e0e0e0;
      --text-primary: #111111;
      --text-muted:   #666666;
      --accent:       #0d9488;
      --accent-glow:  rgba(13, 148, 136, 0.10);
      --btn-bg:       #efefef;
      --btn-hover:    #e0e0e0;
      --toggle-bg:    #e0e0e0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 0;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* ---- Dark/Light Mode Toggle ---- */
    .toggle-wrap {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 100;
    }

    .toggle-btn {
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-btn:hover {
      border-color: var(--accent);
    }

    .toggle-icon { font-size: 15px; }

    /* ---- Profile Card ---- */
    .card {
      position: relative;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 32px 24px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.08);
      transition: background 0.3s, border-color 0.3s;
    }

    /* ---- Avatar ---- */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background-color: var(--btn-hover);
      background-image: url("sean.png");
      background-size: cover;
      background-position: center;
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .avatar-placeholder {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--text-muted);
      user-select: none;
    }

    /* ---- Name & Tagline ---- */
    .profile-name {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -0.3px;
      text-align: center;
      color: var(--text-primary);
    }

    .profile-tagline {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    /* ---- Divider ---- */
    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      border-radius: 999px;
      opacity: 0.5;
      margin: 4px 0;
    }

    /* ---- Link Buttons ---- */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 18px;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      cursor: pointer;
    }

    .link-btn:hover {
      background: var(--btn-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .link-btn:active {
      transform: translateY(0px);
    }

    .btn-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .btn-label { color: var(--text-primary); }

    .btn-arrow {
      color: var(--text-muted);
      font-size: 18px;
      transition: transform 0.2s, color 0.2s;
    }

    .link-btn:hover .btn-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    /* ---- Email Widget ---- */
    .email-widget {
      width: 100%;
    }

    /* The trigger button uses .link-btn styles above but needs slight tweaks */
    .email-trigger-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 18px;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s, border-bottom-left-radius 0.25s, border-bottom-right-radius 0.25s;
    }

    .email-trigger-btn:hover {
      background: var(--btn-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .email-trigger-btn.open {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
      border-color: var(--accent);
      background: var(--btn-hover);
      transform: none;
      box-shadow: none;
    }

    .email-trigger-btn .btn-arrow {
      transition: transform 0.3s ease, color 0.2s;
    }

    .email-trigger-btn.open .btn-arrow {
      transform: rotate(90deg);
      color: var(--accent);
    }

    /* ---- Expanding Form Panel ---- */
    .email-form-panel {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: scaleY(0.97);
      transform-origin: top center;
      transition:
        max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.3s ease,
        transform 0.3s ease;
      border: 1px solid var(--accent);
      border-top: none;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      background: var(--btn-bg);
    }

    .email-form-panel.open {
      max-height: 500px;
      opacity: 1;
      transform: scaleY(1);
    }

    .form-inner {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-field label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .form-field input,
    .form-field textarea {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .form-field input::placeholder,
    .form-field textarea::placeholder {
      color: var(--text-muted);
    }

    .form-field input:focus,
    .form-field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-field textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-submit-btn {
      width: 100%;
      padding: 11px 18px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 2px;
    }

    .form-submit-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .form-submit-btn:active {
      transform: translateY(0);
    }

    .form-submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .form-status {
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      color: var(--accent);
    }

    .form-status.error {
      color: #f87171;
    }

    /* ---- Footer ---- */
    footer {
      margin-top: auto;
      padding: 24px 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      width: 100%;
      max-width: 480px;
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--accent); }

  </style>

</head>

<body>

  <div class="card">

<div class="toggle-wrap">
  <button class="toggle-btn" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="theme-icon">🌙</span>
  </button>
</div>

<div class="avatar">
  <span class="avatar-placeholder"> </span>
</div>

<h1 class="profile-name">Sean Bennett</h1>
<p class="profile-tagline">Let's connect! Check out my links below.</p>

<div class="divider"></div>

<nav class="links" aria-label="Links">

  <!-- Button 1 -->
  <a href="https://www.facebook.com/sbenn129" target="_blank" class="link-btn">
    <span class="btn-left">
      <span class="btn-icon"><i class="fa-brands fa-facebook"></i></span>
      <span class="btn-label">Facebook</span>
    </span>
    <span class="btn-arrow">›</span>
  </a>

  <!-- Button 2 -->
  <a href="https://www.instagram.com/sbenn129" target="_blank" class="link-btn">
    <span class="btn-left">
      <span class="btn-icon"><i class="fa-brands fa-instagram"></i></span>
      <span class="btn-label">Instagram</span>
    </span>
    <span class="btn-arrow">›</span>
  </a>

  <!-- Button 3 -->
  <a href="https://www.youtube.com/@sbenn129" class="link-btn">
    <span class="btn-left">
      <span class="btn-icon"><i class="fa-brands fa-youtube"></i></span>
      <span class="btn-label">YouTube</span>
    </span>
    <span class="btn-arrow">›</span>
  </a>

  <!-- Button 4 -->
  <a href="https://www.linkedin.com/in/sbenn129" target="_blank" class="link-btn">
    <span class="btn-left">
      <span class="btn-icon"><i class="fa-brands fa-linkedin-in"></i></span>
      <span class="btn-label">LinkedIn</span>
    </span>
    <span class="btn-arrow">›</span>
  </a>

  <!-- Button 5 -->
  <a href="https://sean.bennett.ws/resume" target="_blank" class="link-btn">
    <span class="btn-left">
      <span class="btn-icon"><i class="fa fa-file-alt"></i></span>
      <span class="btn-label">Resume</span>
    </span>
    <span class="btn-arrow">›</span>
  </a>

  <!-- Button 6: Email with expanding form -->
  <div class="email-widget">
    <button
      class="email-trigger-btn"
      id="emailTrigger"
      onclick="toggleEmailForm()"
      aria-expanded="false"
      aria-controls="emailFormPanel"
    >
      <span class="btn-left">
        <span class="btn-icon"><i class="fa fa-envelope"></i></span>
        <span class="btn-label">Email</span>
      </span>
      <span class="btn-arrow">›</span>
    </button>

    <div class="email-form-panel" id="emailFormPanel" role="region" aria-label="Contact form">
      <div class="form-inner">
        <div class="form-field">
          <label for="contactName">Your Name</label>
          <input type="text" id="contactName" name="name" placeholder="Jane Smith" autocomplete="name" />
        </div>
        <div class="form-field">
          <label for="contactEmail">Your Email</label>
          <input type="email" id="contactEmail" name="email" placeholder="jane@example.com" autocomplete="email" />
        </div>
        <div class="form-field">
          <label for="contactMessage">Message</label>
          <textarea id="contactMessage" name="message" placeholder="Say hello..."></textarea>
        </div>
        <button class="form-submit-btn" id="submitBtn" onclick="submitForm()">Send Message</button>
        <p class="form-status" id="formStatus"></p>
      </div>
    </div>
  </div>

</nav>

  </div>

  <footer>
    <p><a href="https://sean.bennett.ws/">SEAN.BENNETT.WS</a></p>
  </footer>

  <script>
    /* ---- Theme Toggle ---- */
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
    }

    /* ---- Email Form Toggle ---- */
    function toggleEmailForm() {
      const trigger = document.getElementById('emailTrigger');
      const panel   = document.getElementById('emailFormPanel');
      const isOpen  = panel.classList.contains('open');

      if (isOpen) {
        panel.classList.remove('open');
        trigger.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
      } else {
        panel.classList.add('open');
        trigger.classList.add('open');
        trigger.setAttribute('aria-expanded', 'true');
        // Focus first field after animation
        setTimeout(() => document.getElementById('contactName').focus(), 320);
      }
    }

    /* ---- Formspree Submission ---- */
    async function submitForm() {
      const name    = document.getElementById('contactName').value.trim();
      const email   = document.getElementById('contactEmail').value.trim();
      const message = document.getElementById('contactMessage').value.trim();
      const status  = document.getElementById('formStatus');
      const btn     = document.getElementById('submitBtn');

      // Basic validation
      if (!name || !email || !message) {
        status.textContent = 'Please fill in all fields.';
        status.className = 'form-status error';
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        status.textContent = 'Please enter a valid email address.';
        status.className = 'form-status error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';
      status.textContent = '';
      status.className = 'form-status';

      try {
        const res = await fetch('https://formspree.io/f/xaqaaegn', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ name, email, message })
        });

        if (res.ok) {
          status.textContent = '✓ Message sent!';
          status.className = 'form-status';
          document.getElementById('contactName').value    = '';
          document.getElementById('contactEmail').value   = '';
          document.getElementById('contactMessage').value = '';
          btn.textContent = 'Send Message';
          btn.disabled = false;
          // Close after 2.5s
          setTimeout(() => toggleEmailForm(), 2500);
        } else {
          throw new Error('Server error');
        }
      } catch (err) {
        status.textContent = 'Something went wrong. Please try again.';
        status.className = 'form-status error';
        btn.textContent = 'Send Message';
        btn.disabled = false;
      }
    }
  </script>

</body></html>
