    /* ============================================================
      THEME SYSTEM
      All colors live here as CSS variables.
      Dark mode is the default. Light mode values are below it.

      HOW TO SWITCH THEMES:
        1. Find a palette you like in the "COLOR PALETTES" section below.
        2. Copy its --accent and --accent-glow values into the
           [data-theme="dark"] and [data-theme="light"] blocks.
        3. Done! The toggle will still work automatically.
    ============================================================ */

    /* --- ACTIVE THEME: DEFAULT (Neutral) ---
       Clean, works for anyone. Accent is a soft white/warm white. */
    [data-theme="dark"] {
      --bg:           #0f0f0f;
      --bg-card:      #1a1a1a;
      --border:       #2a2a2a;
      --text-primary: #f0f0f0;
      --text-muted:   #888888;
      --accent:       #2dd4bf;
      --accent-glow:  rgba(45, 212, 191, 0.15);
      --btn-bg:       #1e1e1e;
      --btn-hover:    #2c2c2c;
      --toggle-bg:    #2a2a2a;
    }

    [data-theme="light"] {
      --bg:           #f5f5f5;
      --bg-card:      #ffffff;
      --border:       #e0e0e0;
      --text-primary: #111111;
      --text-muted:   #666666;
      --accent:       #0d9488;
      --accent-glow:  rgba(13, 148, 136, 0.10);
      --btn-bg:       #efefef;
      --btn-hover:    #e0e0e0;
      --toggle-bg:    #e0e0e0;
    }

    /* ============================================================
      COLOR PALETTES
      To use one of these, copy the block into the [data-theme="dark"]
      and [data-theme="light"] sections above, replacing only the
      --accent and --accent-glow lines (and --bg / --bg-card if noted).
    ============================================================

      -- PALETTE 1: Ocean Teal --
      Dark:
        --accent:      #2dd4bf;
        --accent-glow: rgba(45, 212, 191, 0.15);
      Light:
        --accent:      #0d9488;
        --accent-glow: rgba(13, 148, 136, 0.10);

      -- PALETTE 2: Warm Gold --
      Dark:
        --accent:      #f5a623;
        --accent-glow: rgba(245, 166, 35, 0.15);
      Light:
        --accent:      #b45309;
        --accent-glow: rgba(180, 83, 9, 0.10);

      -- PALETTE 3: Soft Lavender --
      Dark:
        --accent:      #a78bfa;
        --accent-glow: rgba(167, 139, 250, 0.15);
      Light:
        --accent:      #7c3aed;
        --accent-glow: rgba(124, 58, 237, 0.10);

      -- PALETTE 4: Rose Pink --
      Dark:
        --accent:      #fb7185;
        --accent-glow: rgba(251, 113, 133, 0.15);
      Light:
        --accent:      #e11d48;
        --accent-glow: rgba(225, 29, 72, 0.10);

      -- PALETTE 5: Electric Blue --
      Dark:
        --accent:      #38bdf8;
        --accent-glow: rgba(56, 189, 248, 0.15);
      Light:
        --accent:      #0284c7;
        --accent-glow: rgba(2, 132, 199, 0.10);

      -- PALETTE 6: Sage Green --
      Dark:
        --accent:      #86efac;
        --accent-glow: rgba(134, 239, 172, 0.15);
      Light:
        --accent:      #16a34a;
        --accent-glow: rgba(22, 163, 74, 0.10);
    ============================================================ */

    /* ============================================================
      BASE STYLES — you generally don't need to edit below this line
    ============================================================ */

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 0;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* ---- Dark/Light Mode Toggle ---- */
    .toggle-wrap {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 100;
    }

    .toggle-btn {
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-btn:hover {
      border-color: var(--accent);
    }

    .toggle-icon { font-size: 15px; }

    /* ---- Profile Card ---- */
    .card {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 32px 24px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.08);
      transition: background 0.3s, border-color 0.3s;
    }

      background-position: center;
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;

    .avatar-placeholder {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--text-muted);
      user-select: none;
    }

    /* ---- Name & Tagline ---- */
    .profile-name {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -0.3px;
      text-align: center;
      color: var(--text-primary);
    }

    .profile-tagline {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    /* ---- Divider ---- */
    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      border-radius: 999px;
      opacity: 0.5;
      margin: 4px 0;
    }

    /* ---- Link Buttons ---- */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

      transition: color 0.2s;
    }

    footer a:hover { color: var(--accent); }

  </style>

</head>

  <script>
    // Page loads in dark mode by default.
    // The toggle button switches between dark and light.

    function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('toggle-icon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('toggle-label').textContent = isDark ? 'Light' : 'Dark';
}
